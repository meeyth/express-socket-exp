<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentX Style Chat</title>
    <style>
        /* Import a clean, modern sans-serif font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #E6E7E9; /* Light gray background */
            /* Subtle dot pattern to mimic the textured background */
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 24px 24px;
            margin: 0; 
            padding: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Navigation Pill */
        .navbar {
            background-color: #161616;
            color: #ffffff;
            border-radius: 40px;
            padding: 12px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 80%;
            max-width: 900px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            font-size: 14px;
            font-weight: 500;
        }

        .navbar-brand { font-weight: 600; letter-spacing: 1px; font-size: 16px; }
        .navbar-links span { margin: 0 15px; color: #a0a0a0; cursor: pointer; }
        .navbar-links span:hover { color: #fff; }
        
        .navbar-btn {
            background: #fff;
            color: #161616;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Main Chat Card */
        .chat-container {
            background-color: #dadddf;
            border: 1px solid #c8cacc;
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
            height: 550px;
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #c8cacc;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 14px;
            background: #dadddf;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #000;
            border-radius: 50%;
        }

        #messages { 
            flex-grow: 1;
            list-style-type: none; 
            padding: 20px; 
            margin: 0; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Chat Bubbles */
        .message {
            max-width: 75%;
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.received {
            background-color: #E9ECEF;
            color: #161616;
            align-self: flex-start;
            border-radius: 18px 18px 18px 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .message.sent {
            background-color: #161616;
            color: #ffffff;
            align-self: flex-end;
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Input Area */
        #form { 
            display: flex; 
            padding: 15px; 
            background: #dadddf;
            gap: 10px; 
        }

        #input { 
            flex-grow: 1; 
            padding: 12px 20px; 
            font-size: 14px; 
            border: 1px solid #c8cacc; 
            border-radius: 30px; 
            background-color: #e9ecef;
            outline: none;
            transition: all 0.2s ease;
        }

        #input:focus {
            border-color: #999;
            background-color: #fff;
        }

        button { 
            padding: 12px 24px; 
            font-size: 14px; 
            background-color: #161616; 
            color: white; 
            border: none; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover { background-color: #333; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="navbar-brand">AGENTX THEME</div>
        <div class="navbar-links" style="display: none;">
            <span>Chatbot</span>
            <span>Pricing</span>
            <span>API</span>
        </div>
        <div class="navbar-btn">Sign up - it's free</div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="status-dot"></div>
            Agent AI
        </div>
        
        <ul id="messages"></ul>
        
        <form id="form" action="">
            <input id="input" autocomplete="off" placeholder="Type your message..." required />
            <button>Send</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // Generate a random ID for this tab so we know which messages are "ours"
        const mySessionId = Math.random().toString(36).substring(2, 10);

        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                // Send an object containing both the message and our session ID
                socket.emit('chat_message', {
                    text: input.value,
                    senderId: mySessionId
                });
                input.value = '';
            }
        });

        socket.on('chat_message', (data) => {
            const item = document.createElement('li');
            item.classList.add('message');
            
            // Check if we sent this message to style it black (sent) or gray (received)
            if (data.senderId === mySessionId) {
                item.classList.add('sent');
            } else {
                item.classList.add('received');
            }
            
            item.textContent = data.text;
            messages.appendChild(item);
            
            messages.scrollTop = messages.scrollHeight;
        });
    </script>
</body>
</html>
