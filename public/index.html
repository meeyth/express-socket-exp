<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.io Chat App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        #messages { list-style-type: none; padding: 0; margin-bottom: 20px; border: 1px solid #ddd; height: 300px; overflow-y: auto; border-radius: 4px;}
        #messages li { padding: 10px; border-bottom: 1px solid #eee; }
        #messages li:nth-child(odd) { background-color: #f9f9f9; }
        #form { display: flex; gap: 10px; }
        #input { flex-grow: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h2>Express + Socket.io Chat</h2>
    
    <ul id="messages"></ul>
    
    <form id="form" action="">
        <input id="input" autocomplete="off" placeholder="Type a message..." required />
        <button>Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Initialize the Socket.io client
        const socket = io();

        // Get DOM elements
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');

        // Handle form submission
        form.addEventListener('submit', (e) => {
            e.preventDefault(); // Prevent page reload
            if (input.value) {
                // Emit the message to the server
                socket.emit('chat_message', input.value);
                input.value = ''; // Clear input field
            }
        });

        // Listen for incoming messages from the server
        socket.on('chat_message', (msg) => {
            const item = document.createElement('li');
            item.textContent = msg;
            messages.appendChild(item);
            
            // Auto-scroll to the bottom
            messages.scrollTop = messages.scrollHeight;
        });
    </script>
</body>
</html>
